name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      LAR_FRONTEND_API_BASE_URL: mock
      LAR_FRONTEND_ENVIRONMENT_LABEL: Frontend mock mode
      LAR_FRONTEND_MOCK_API: "true"
      LAR_FRONTEND_ROLE: DeliveryLead

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Generate runtime config
        working-directory: frontend
        run: pnpm config:local

      - name: Lint
        working-directory: frontend
        run: pnpm exec nx lint transformation-console --skip-nx-cache --output-style=stream

      - name: Typecheck
        working-directory: frontend
        run: pnpm exec tsc -p apps/transformation-console/tsconfig.app.json --noEmit

      - name: Build
        working-directory: frontend
        run: pnpm exec nx build transformation-console --skip-nx-cache --output-style=stream

      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps

      - name: Smoke test routes
        working-directory: frontend
        run: pnpm exec nx e2e transformation-console-e2e --skip-nx-cache --output-style=stream

  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore backend/LargeRetailer.Modernisation.sln

      - name: Build
        run: dotnet build backend/LargeRetailer.Modernisation.sln --no-restore /nr:false /m:1

      - name: Test
        run: dotnet test backend/LargeRetailer.Modernisation.sln --no-restore /nr:false /m:1

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build images
        run: docker compose build
