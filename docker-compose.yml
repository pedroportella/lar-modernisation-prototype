services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ASPNETCORE_URLS: ${LAR_BACKEND_CONTAINER_URLS:-http://+:8080}
      ConnectionStrings__ModernisationDb: ${ConnectionStrings__ModernisationDb:-Data Source=/data/modernisation.db}
      Cors__AllowedOrigins__0: ${LAR_BACKEND_CORS_ORIGIN:-http://localhost:4200}
      Security__RateLimiting__PermitLimit: ${LAR_BACKEND_RATE_LIMIT_PERMIT_LIMIT:-120}
      Security__RateLimiting__WindowSeconds: ${LAR_BACKEND_RATE_LIMIT_WINDOW_SECONDS:-60}
    ports:
      - "${LAR_BACKEND_PORT:-5029}:8080"
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    environment:
      LAR_FRONTEND_API_BASE_URL: ${LAR_FRONTEND_API_BASE_URL:-http://localhost:5029}
      LAR_FRONTEND_ENVIRONMENT_LABEL: ${LAR_FRONTEND_ENVIRONMENT_LABEL:-Docker API mode}
      LAR_FRONTEND_MOCK_API: ${LAR_FRONTEND_MOCK_API:-false}
      LAR_FRONTEND_ROLE: ${LAR_FRONTEND_ROLE:-DeliveryLead}
    ports:
      - "${LAR_FRONTEND_PORT:-4200}:80"

volumes:
  backend-data:
